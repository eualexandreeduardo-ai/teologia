<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Acesso à Academia Teológica do zero ao saber."/>
  <title>Entrar — Academia Teológica do zero ao saber</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,900&family=Crimson+Pro:ital,wght@0,400;0,600&display=swap" rel="stylesheet"/>
  <link href="assets/style.css" rel="stylesheet"/>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/supabase-config.js"></script>
  <script defer src="assets/auth.js"></script>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand">
      <span class="login-kicker">FORMAÇÃO CRISTÃ</span>
      <h1>Academia Teológica <small>do zero ao saber</small></h1>
      <p>Seu caminho de estudo, agora salvo com segurança na sua conta.</p>
    </section>
    <section class="login-card" aria-labelledby="login-title">
      <h2 id="login-title">Continue sua jornada</h2>
      <p>Entre ou crie sua conta gratuitamente.</p>
      <form id="login-form">
        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" autocomplete="email" placeholder="voce@exemplo.com" required/>
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Mínimo de 6 caracteres" minlength="6" required/>
        <div id="auth-message" class="auth-message" role="status" aria-live="polite"></div>
        <button id="login-button" class="btn btn-green login-primary" type="submit">Entrar</button>
        <button id="signup-button" class="login-secondary" type="button">Criar conta</button>
      </form>
      <p class="login-note">Ao criar uma conta, seu progresso fica associado ao seu e-mail.</p>
    </section>
  </main>
</body>
</html>
